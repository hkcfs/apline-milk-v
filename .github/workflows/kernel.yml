name: Weekly kernel build

# Every week: build the latest stable Linux kernel for both arches. Always pulls
# the newest kernel (build.sh fetches kernel.org latest), so a new kernel shows
# up automatically. Publishes the Image + DTBs as a dated release.
on:
  schedule:
    - cron: '23 3 * * 1'          # every Monday 03:23 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build & push the prebaked builder image first so the kernel jobs always get
  # a valid image (no race / no fragile inline `docker build` fallback).
  build-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/builder-riscv:latest
            ghcr.io/${{ github.repository }}/builder-arm64:latest
            ghcr.io/${{ github.repository }}/builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  kernel:
    needs: build-builder
    runs-on: ubuntu-latest
    concurrency:
      group: kernel-${{ matrix.arch }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv, arm64]
    steps:
      - uses: actions/checkout@v4

      # Register binfmt so the builder container can chroot into the foreign-arch
      # rootfs via qemu-user.
      - name: Register binfmt (qemu-user)
        uses: docker/setup-qemu-action@v3

      - name: Build kernel (${{ matrix.arch }})
        run: |
          mkdir -p "outputs/${{ matrix.arch }}" "outputs/kernel-${{ matrix.arch }}"
          docker pull ghcr.io/${{ github.repository }}/builder-${{ matrix.arch }}:latest
          docker run --rm --privileged \
            -v "${{ github.workspace }}/outputs:/project/images" \
            -v "${{ github.workspace }}/.kernel-src-${{ matrix.arch }}:/project/kernel/linux" \
            -v "${{ github.workspace }}/.ccache:/project/.ccache" \
            ghcr.io/${{ github.repository }}/builder-${{ matrix.arch }}:latest \
            bash /project/build.sh --arch ${{ matrix.arch }} duo256m

      - name: Package kernel artifacts
        run: |
          cd outputs
          mkdir -p pkg
          cp kernel-${{ matrix.arch }}/Image pkg/ 2>/dev/null || true
          mkdir -p pkg/dtb/sophgo
          cp kernel-${{ matrix.arch }}/dtb/sophgo/*.dtb pkg/dtb/sophgo/ 2>/dev/null || true
          cp ${{ matrix.arch }}/patch-report.txt pkg/ 2>/dev/null || true
          cp ${{ matrix.arch }}/kernel-build.log pkg/ 2>/dev/null || true
          zip -r ../kernel-${{ matrix.arch }}.zip pkg/
        working-directory: ${{ github.workspace }}

      # CI runners are ephemeral, so named volumes don't persist between runs;
      # mount the workspace dirs instead so the kernel source is reused within a run.

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.arch }}
          path: kernel-${{ matrix.arch }}.zip

      - name: Set release date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Publish weekly kernel release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel-${{ matrix.arch }}-${{ steps.date.outputs.date }}
          name: Kernel ${{ matrix.arch }} ${{ steps.date.outputs.date }}
          prerelease: false
          files: kernel-${{ matrix.arch }}.zip
