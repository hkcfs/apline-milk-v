name: Weekly kernel build

# Every week: build the latest stable Linux kernel for both arches. Always pulls
# the newest kernel (build.sh fetches kernel.org latest), so a new kernel shows
# up automatically. Publishes the Image + DTBs as a dated release.
on:
  schedule:
    - cron: '23 3 * * 1'          # every Monday 03:23 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  kernel:
    runs-on: ubuntu-latest
    concurrency:
      group: kernel-${{ matrix.arch }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv, arm64]
    steps:
      - uses: actions/checkout@v4

      # Register binfmt so the builder container can chroot into the foreign-arch
      # rootfs via qemu-user.
      - name: Register binfmt (qemu-user)
        uses: docker/setup-qemu-action@v3

      # Build the builder image *in this job* from the committed Dockerfile. No
      # prebuilt pull and no GHA layer cache: a stale cached `COPY kernel/` layer
      # would bake old (broken) patches. Building here keeps the image in sync
      # with the checked-out source tree.
      - name: Build builder image (self-contained, no cache)
        run: |
          docker build --no-cache -f docker/Dockerfile \
            -t builder-${{ matrix.arch }}:local .

      - name: Build kernel (${{ matrix.arch }})
        run: |
          mkdir -p "outputs/${{ matrix.arch }}" "outputs/kernel-${{ matrix.arch }}"
          set -o pipefail
          docker run --rm --privileged \
            -v "${{ github.workspace }}/outputs:/project/images" \
            -v "${{ github.workspace }}/.kernel-src-${{ matrix.arch }}:/project/kernel/linux" \
            -v "${{ github.workspace }}/.ccache:/project/.ccache" \
            builder-${{ matrix.arch }}:local \
            bash /project/build.sh --arch ${{ matrix.arch }} --kernel-only duo256m \
            2>&1 | tee "outputs/${{ matrix.arch }}/kernel-build.log"

      - name: Package kernel artifacts
        run: |
          cd outputs
          mkdir -p pkg/modules
          cp kernel-${{ matrix.arch }}/Image pkg/ 2>/dev/null || true
          mkdir -p pkg/dtb/sophgo
          cp kernel-${{ matrix.arch }}/dtb/sophgo/*.dtb pkg/dtb/sophgo/ 2>/dev/null || true
          cp ${{ matrix.arch }}/patch-report.txt pkg/ 2>/dev/null || true
          cp ${{ matrix.arch }}/kernel-build.log pkg/ 2>/dev/null || true
          # Self-contained update bundle users can apply to a running board.
          cp kernel-${{ matrix.arch }}/alpine-milkv-kernel-${{ matrix.arch }}.tar.gz pkg/ 2>/dev/null || true
          cp -r kernel-${{ matrix.arch }}/modules/lib/modules pkg/modules/ 2>/dev/null || true
          zip -r ../kernel-${{ matrix.arch }}.zip pkg/
        working-directory: ${{ github.workspace }}

      # CI runners are ephemeral, so named volumes don't persist between runs;
      # mount the workspace dirs instead so the kernel source is reused within a run.

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.arch }}
          path: kernel-${{ matrix.arch }}.zip

      - name: Set release date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Publish weekly kernel release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel-${{ matrix.arch }}-${{ steps.date.outputs.date }}
          name: Kernel ${{ matrix.arch }} ${{ steps.date.outputs.date }}
          prerelease: false
          files: |
            kernel-${{ matrix.arch }}.zip
            outputs/kernel-${{ matrix.arch }}/alpine-milkv-kernel-${{ matrix.arch }}.tar.gz
