name: Monthly image release

# Once a month: build the COMPLETE flashable image (latest stable kernel + latest
# Alpine) for the Milk-V Duo 256M (riscv / SG2002), boot it in QEMU to PROVE it
# works, and publish a release whose notes contain the full boot log + diagnostics
# (auto-build proof, same idea as nuttx-sg2000 releases).
# NOTE: riscv is the primary, mainline-kernel target. arm64 uses the vendor
# kernel from scpcom/linux (~ v5.10.260) which DOES support the Duo 256M's
# Cortex-A53 core and ships the real board DTB (cv181x_milkv_duo256m_sd.dtb),
# so it is intended to boot on real hardware. It is still marked experimental
# here pending user validation on the physical board; the QEMU boot proof uses
# -machine virt (which supplies its own DTB).
on:
  schedule:
    - cron: '37 4 1 * *'          # 1st of every month 04:37 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build & push the prebaked builder image first so the image jobs always get
  # a valid image (no race / no fragile inline `docker build` fallback).
  build-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/builder-riscv:latest
            ghcr.io/${{ github.repository }}/builder-arm64:latest
            ghcr.io/${{ github.repository }}/builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  image:
    needs: build-builder
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv, arm64]
    steps:
      - uses: actions/checkout@v4

      # Register binfmt so the builder container can chroot into the foreign-arch
      # (riscv64 / aarch64) rootfs via qemu-user. Without this the build's
      # second-stage chroot fails with "Exec format error" on x86 runners.
      - name: Register binfmt (qemu-user)
        uses: docker/setup-qemu-action@v3

      - name: Install QEMU / sshpass / mtools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-riscv64 qemu-system-arm \
            sshpass mtools

      - name: Build image (${{ matrix.arch }})
        run: |
          # outputs/ is gitignored and absent on a clean checkout; the build.log
          # redirect below needs the arch subdir to already exist.
          mkdir -p "outputs/${{ matrix.arch }}" "outputs/kernel-${{ matrix.arch }}"
          docker pull ghcr.io/${{ github.repository }}/builder-${{ matrix.arch }}:latest
          docker run --rm --privileged \
            -v "${{ github.workspace }}/outputs:/project/images" \
            -v "${{ github.workspace }}/.kernel-src-${{ matrix.arch }}:/project/kernel/linux" \
            -v "${{ github.workspace }}/.ccache:/project/.ccache" \
            ghcr.io/${{ github.repository }}/builder-${{ matrix.arch }}:latest \
            bash /project/build.sh --arch ${{ matrix.arch }} duo256m \
            > "outputs/${{ matrix.arch }}/build.log" 2>&1

      - name: Capture build + boot proof
        run: |
          IMAGE="outputs/${{ matrix.arch }}/alpine-milkv-duo256m-${{ matrix.arch }}.img"
          KERNEL="outputs/kernel-${{ matrix.arch }}/Image"
          [ -f "$KERNEL" ] || KERNEL=""   # fall back to extracting from the image
          BUILD_LOG="outputs/${{ matrix.arch }}/build.log"
          sh scripts/capture-boot.sh "${{ matrix.arch }}" "$IMAGE" "$KERNEL" "$BUILD_LOG" \
            > "outputs/boot-${{ matrix.arch }}.md"

      - name: Compress image for release
        run: gzip -kf "outputs/${{ matrix.arch }}/alpine-milkv-duo256m-${{ matrix.arch }}.img"

      - name: Per-arch release notes
        run: |
          {
            echo "# Milk-V Duo 256M (${{ matrix.arch }}) - $(date +'%Y-%m')"
            echo
            echo "Auto-built from the Linux kernel (riscv: latest stable; arm64: vendor"
            echo "scpcom/linux) and Alpine Linux, then booted in QEMU to prove it works"
            echo "(see the build + boot log below)."
            echo
            echo "Flash with:"
            echo '```'
            echo "gzip -cd alpine-milkv-duo256m-${{ matrix.arch }}.img.gz | sudo dd of=/dev/sdX bs=4M status=progress"
            echo '```'
            echo
            echo "### Build + boot proof (auto-captured)"
            echo
            cat "outputs/boot-${{ matrix.arch }}.md"
          } > "outputs/notes-${{ matrix.arch }}.md"

      - name: Set release date
        id: date
        run: echo "date=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Publish per-arch release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: duo256m-${{ matrix.arch }}-${{ steps.date.outputs.date }}
          name: Duo 256M ${{ matrix.arch }} ${{ steps.date.outputs.date }}
          body_path: outputs/notes-${{ matrix.arch }}.md
          prerelease: false
          files: |
            outputs/${{ matrix.arch }}/alpine-milkv-duo256m-${{ matrix.arch }}.img.gz

      - name: Upload boot log for combined notes
        uses: actions/upload-artifact@v4
        with:
          name: boot-${{ matrix.arch }}
          path: outputs/boot-${{ matrix.arch }}.md

  release-notes:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: boot-*
          path: boots
      - name: Assemble combined release notes
        run: |
          {
            echo "# Milk-V Duo 256M (SG2002) auto-built images - $(date +'%Y-%m')"
            echo
            echo "Automatically built from the latest stable Linux kernel and the"
            echo "latest Alpine Linux for the Milk-V Duo 256M (riscv / SG2002)."
            echo "riscv is the primary, mainline-kernel image. arm64 uses the vendor"
            echo "scpcom/linux kernel (~ v5.10.260) which supports the SG2002's"
            echo "Cortex-A53 core and is intended to boot on real hardware; it is"
            echo "experimental pending user validation on the physical board."
            echo
            for a in riscv arm64; do
              echo "## $a"
              echo
              echo "Flash with:"
              echo '```'
              echo "gzip -cd alpine-milkv-duo256m-${a}.img.gz | sudo dd of=/dev/sdX bs=4M status=progress"
              echo '```'
              echo
              echo "### Boot proof (auto-captured in QEMU)"
              echo
              find boots -name "boot-${a}.md" -exec cat {} \; 2>/dev/null || echo "_boot log missing_"
              echo
            done
            echo "## Combined download"
            echo
            echo "RISC-V (primary): \`alpine-milkv-duo256m-riscv.img.gz\`"
            echo "ARM64 (experimental, vendor kernel for real A53 core): \`alpine-milkv-duo256m-arm64.img.gz\`"
          } > NOTES.md
          cat NOTES.md
      - name: Set release date
        id: date
        run: echo "date=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Publish combined release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: duo256m-${{ steps.date.outputs.date }}
          name: Duo 256M ${{ steps.date.outputs.date }}
          body_path: NOTES.md
          prerelease: false
