name: Monthly image release

# Once a month: build the COMPLETE flashable image (latest stable kernel + latest
# Alpine) for the Milk-V Duo 256M (riscv / SG2002), boot it in QEMU to PROVE it
# works, and publish a release whose notes contain the full boot log + diagnostics
# (auto-build proof, same idea as nuttx-sg2000 releases).
# NOTE: riscv is the primary, mainline-kernel target. arm64 uses the vendor
# kernel from scpcom/linux (~ v5.10.260) which DOES support the Duo 256M's
# Cortex-A53 core and ships the real board DTB (cv181x_milkv_duo256m_sd.dtb),
# so it is intended to boot on real hardware. It is still marked experimental
# here pending user validation on the physical board; the QEMU boot proof uses
# -machine virt (which supplies its own DTB).
on:
  schedule:
    - cron: '37 4 1 * *'          # 1st of every month 04:37 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv, arm64]
    steps:
      - uses: actions/checkout@v4

      # Register binfmt so the builder container can chroot into the foreign-arch
      # (riscv64 / aarch64) rootfs via qemu-user. Without this the build's
      # second-stage chroot fails with "Exec format error" on x86 runners.
      - name: Register binfmt (qemu-user)
        uses: docker/setup-qemu-action@v3

      - name: Install QEMU / sshpass / mtools / buildx
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-riscv64 qemu-system-arm \
            sshpass mtools

      # Build the builder image *in this job* straight from the committed
      # Dockerfile. We deliberately DO NOT pull a prebuilt ghcr.io image and DO
      # NOT use the GHA layer cache: a stale cached `COPY kernel/` layer would
      # bake the OLD (broken) patches and silently produce a broken image that
      # fails the build at the very end (exit 2). Building here guarantees the
      # image always contains the exact source tree that was just checked out.
      - name: Build builder image (self-contained, no cache)
        run: |
          docker build --no-cache -f docker/Dockerfile \
            -t builder-${{ matrix.arch }}:local .

      - name: Build image (${{ matrix.arch }})
        run: |
          # outputs/ is gitignored and absent on a clean checkout; the build.log
          # redirect below needs the arch subdir to already exist.
          mkdir -p "outputs/${{ matrix.arch }}" "outputs/kernel-${{ matrix.arch }}"
          # pipefail ensures a build.sh failure (non-zero) is NOT masked by tee's
          # exit 0, so the step still turns red on a real build error.
          set -o pipefail
          docker run --rm --privileged \
            -v "${{ github.workspace }}/outputs:/project/images" \
            -v "${{ github.workspace }}/.kernel-src-${{ matrix.arch }}:/project/kernel/linux" \
            -v "${{ github.workspace }}/.ccache:/project/.ccache" \
            builder-${{ matrix.arch }}:local \
            bash /project/build.sh --arch ${{ matrix.arch }} duo256m \
            2>&1 | tee "outputs/${{ matrix.arch }}/build.log"
          # The image is written by the privileged builder container (root), so it
          # is root-owned on the host. Reown the outputs so the later QEMU boot
          # proof (which runs as the non-root runner user and opens the disk
          # read-write) and the release upload can access it.
          sudo chown -R "$(id -u):$(id -g)" "outputs/${{ matrix.arch }}"

      - name: Capture build + boot proof
        run: |
          IMAGE="outputs/${{ matrix.arch }}/alpine-milkv-duo256m-${{ matrix.arch }}.img"
          KERNEL="outputs/kernel-${{ matrix.arch }}/Image"
          [ -f "$KERNEL" ] || KERNEL=""   # fall back to extracting from the image
          BUILD_LOG="outputs/${{ matrix.arch }}/build.log"
          sh scripts/capture-boot.sh "${{ matrix.arch }}" "$IMAGE" "$KERNEL" "$BUILD_LOG" \
            > "outputs/boot-${{ matrix.arch }}.md"

      - name: Compress image for release
        run: gzip -kf "outputs/${{ matrix.arch }}/alpine-milkv-duo256m-${{ matrix.arch }}.img"

      - name: Per-arch release notes
        run: |
          {
            echo "# Milk-V Duo 256M (${{ matrix.arch }}) - $(date +'%Y-%m')"
            echo
            echo "Auto-built from the Linux kernel (riscv: latest stable; arm64: vendor"
            echo "scpcom/linux) and Alpine Linux, then booted in QEMU to prove it works"
            echo "(see the build + boot log below)."
            echo
            echo "Note: this is boot-proven in QEMU only; real-hardware validation on"
            echo "the physical Duo 256M is still pending. Flash at your own risk."
            echo
            echo "Flash with:"
            echo '```'
            echo "gzip -cd alpine-milkv-duo256m-${{ matrix.arch }}.img.gz | sudo dd of=/dev/sdX bs=4M status=progress"
            echo '```'
            echo
            echo "### Build + boot proof (auto-captured)"
            echo
            cat "outputs/boot-${{ matrix.arch }}.md"
            echo
            echo "The complete build log (kernel compile, Alpine setup, QEMU boot proof)"
            echo "is attached to this release as \`build.log\`."
          } > "outputs/notes-${{ matrix.arch }}.md"

      - name: Set release date
        id: date
        run: echo "date=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Publish per-arch release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: duo256m-${{ matrix.arch }}-${{ steps.date.outputs.date }}
          name: Duo 256M ${{ matrix.arch }} ${{ steps.date.outputs.date }}
          body_path: outputs/notes-${{ matrix.arch }}.md
          prerelease: false
          files: |
            outputs/${{ matrix.arch }}/alpine-milkv-duo256m-${{ matrix.arch }}.img.gz
            outputs/${{ matrix.arch }}/build.log

      - name: Upload boot log for combined notes
        uses: actions/upload-artifact@v4
        with:
          name: boot-${{ matrix.arch }}
          path: outputs/boot-${{ matrix.arch }}.md

      - name: Upload full build log for combined notes
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: outputs/${{ matrix.arch }}/build.log

  release-notes:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: boot-*
          path: boots
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: builds
      - name: Set release date
        id: date
        run: echo "date=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"
      - name: Prepare build logs for combined release
        run: |
          mkdir -p release-assets
          cp builds/build-riscv/build.log release-assets/build-riscv.log
          cp builds/build-arm64/build.log release-assets/build-arm64.log
      - name: Fetch per-arch images from their releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p combined
          gh release download "duo256m-riscv-${{ steps.date.outputs.date }}" \
            --pattern 'alpine-milkv-duo256m-riscv.img.gz' --dir combined
          gh release download "duo256m-arm64-${{ steps.date.outputs.date }}" \
            --pattern 'alpine-milkv-duo256m-arm64.img.gz' --dir combined
          ls -lh combined
      - name: Assemble combined release notes
        run: |
          {
            echo "# Milk-V Duo 256M (SG2002) auto-built images - $(date +'%Y-%m')"
            echo
            echo "Automatically built from the latest stable Linux kernel and the"
            echo "latest Alpine Linux for the Milk-V Duo 256M (riscv / SG2002)."
            echo "Two kernels are provided:"
            echo "  - riscv: latest mainline Linux (7.1.3) with SG2002 board support"
            echo "    (device tree + vendor drivers ported from the vendor tree)."
            echo "  - arm64: vendor scpcom/linux kernel (~ v5.10.260) targeting the"
            echo "    SG2002's Cortex-A53 core; it ships the real, tested board DTB."
            echo
            echo "Both images are boot-proven in QEMU only. Neither has yet been"
            echo "validated on the physical Duo 256M board - please report back if"
            echo "you flash one. Flash at your own risk."
            echo
            for a in riscv arm64; do
              echo "## $a"
              echo
              echo "Flash with:"
              echo '```'
              echo "gzip -cd alpine-milkv-duo256m-${a}.img.gz | sudo dd of=/dev/sdX bs=4M status=progress"
              echo '```'
              echo
              echo "### Boot proof (auto-captured in QEMU)"
              echo
              find boots -name "boot-${a}.md" -exec cat {} \; 2>/dev/null || echo "_boot log missing_"
              echo
            done
            echo "## Combined download"
            echo
             echo "  - \`alpine-milkv-duo256m-riscv.img.gz\` (mainline kernel, RISC-V)"
             echo "  - \`alpine-milkv-duo256m-arm64.img.gz\` (vendor kernel, ARM64)"
             echo
             echo "## Full build logs"
             echo
             echo "Complete build logs (kernel compile, Alpine setup, QEMU boot proof) are"
             echo "attached to this release as \`build-riscv.log\` and \`build-arm64.log\`."
           } > NOTES.md
          cat NOTES.md

      - name: Publish combined release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: duo256m-${{ steps.date.outputs.date }}
          name: Duo 256M ${{ steps.date.outputs.date }}
          body_path: NOTES.md
          prerelease: false
          files: |
            release-assets/build-riscv.log
            release-assets/build-arm64.log
            combined/alpine-milkv-duo256m-riscv.img.gz
            combined/alpine-milkv-duo256m-arm64.img.gz
